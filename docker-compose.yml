services:
    db:
        image: mysql:8.4
        restart: always
        ports: 
            - "3306:3306"
        
        environment:
            MYSQL_DATABASE: gestortareas
            MYSQL_PASSWORD: test
            MYSQL_ROOT_PASSWORD: test 
        volumes:
            - ./persistent:/var/lib/mysql
            - ./dump:/docker-entrypoint-initdb.d
        networks:
            - app-network

    www:
        build: .
        ports: 
            - "80:80"
        volumes:
            - ./www:/var/www/html
        depends_on:
            - db
        networks:
            - app-network

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        ports:
            - 8001:80
        environment:
            MYSQL_USER: root
            MYSQL_PASSWORD: test
            MYSQL_ROOT_PASSWORD: test
            PMA_HOST: db
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    persistent: